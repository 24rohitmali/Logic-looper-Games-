<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#414BEA"/>
      <stop offset="100%" stop-color="#7752FE"/>
    </linearGradient>
    <style>
      .word { font-family: 'Inter', Roboto, Arial, sans-serif; font-weight: 700; font-size: 72px; }
    </style>
  </defs>

  <!-- Mark (B in circle) -->
  <g transform="translate(40,40)">
    <circle cx="60" cy="60" r="60" fill="#F6F5F5"/>
    <circle cx="60" cy="60" r="56" fill="url(#g1)"/>
    <text x="60" y="82" text-anchor="middle" font-family="Inter, Roboto, Arial" font-weight="800" font-size="64" fill="white">B</text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(170,120)">
    <text class="word" fill="url(#g1)">Bluestock</text>
  </g>

</svg>